<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beat Generator</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <form onsubmit="return false;">
        <label for="key">key </label> <input type="text" id="key"> <br>
        <label for="mode">mode </label> <select name="mode" id="mode">
            <option value="maj">maj</option>
            <option value="min">min</option>
        </select><br>
        <label for="nChord">number of chords </label><input type="number" id="nChord"><br>
        <button onclick="generateProg()">Generate</button>
    </form>
    
    <script src="http://unpkg.com/tone"></script>
    <script>
        const synth = new Tone.PolySynth(Tone.Synth).toDestination();

        function generateProg() {
            const key = document.getElementById("key").value;
            const mode = document.getElementById("mode").value;
            const nChord = document.getElementById("nChord").value;

            if (!key || !nChord) return alert("Vnesi podatke prosm");
            $.ajax({
                url: `/generate/${key}/${mode}/${nChord}`,
                type: "GET",
                success: function(prog) {
                    console.log("prog:", prog);
                    playProg(prog);
                }
            });
        }
        async function playProg(prog) {
            await Tone.start();
            
            const now = Tone.now(); 
            
            prog.forEach((chordObj, index) => {
                const notesToPlay = chordObj.notes.map(note => note + "4");
                synth.triggerAttackRelease(notesToPlay, "2n", now + (index * 1.5));
            });
        }
    </script>
</body>
</html>
